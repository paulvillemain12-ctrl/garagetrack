<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="GarageTrack" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="manifest" href="manifest.json" />
<title>GarageTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-alt: #1c1c1c;
    --surface-hover: #262626;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.12);
    --accent: #84cc16;
    --accent-dim: rgba(132,204,22,0.18);
    --text: #fafafa;
    --text-dim: #a3a3a3;
    --text-mute: #737373;
    --danger: #f43f5e;
    --success: #84cc16;
    --warn: #f59e0b;
    --radius: 12px;
    --radius-sm: 8px;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter Tight", Inter, system-ui, sans-serif;
    --num: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter Tight", Inter, system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; min-height: 100dvh; overflow-x: hidden; }
  button { font: inherit; color: inherit; background: none; border: none; padding: 0; cursor: pointer; }
  input, textarea, select { font: inherit; color: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; display: none; }

  /* Animations */
  @keyframes gt-ripple { from { width: 10px; height: 10px; opacity: 0.4; } to { width: 320px; height: 320px; opacity: 0; } }
  @keyframes gt-toast { 0% { transform: translateY(20px); opacity: 0; } 10% { transform: translateY(0); opacity: 1; } 90% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-8px); opacity: 0; } }
  @keyframes gt-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.4); } }
  @keyframes gt-rise-in { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes gt-fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes gt-tab-in { from { transform: translateX(8px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes gt-spin { to { transform: rotate(360deg); } }
  @keyframes gt-bar { from { width: 0; } }
  @keyframes gt-rise { from { transform: scaleY(0); } to { transform: scaleY(1); } }

  /* Layout */
  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; background: var(--bg); position: relative; }
  .safe-top { padding-top: env(safe-area-inset-top, 0px); }
  .header { padding-top: max(16px, calc(env(safe-area-inset-top, 0px) + 8px)); }

  /* Header */
  .header { padding: 16px 20px 12px; padding-top: max(16px, env(safe-area-inset-top, 16px)); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--surface); }
  .brand { display: flex; align-items: center; gap: 10px; }
  .logo { width: 30px; height: 30px; border-radius: 7px; background: var(--accent); display: flex; align-items: center; justify-content: center; }
  .brand-name { font-size: 14px; font-weight: 700; letter-spacing: 0.4px; color: var(--text); }
  .brand-sub { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
  .sync-pill { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; background: var(--surface-alt); border: 1px solid var(--border); cursor: pointer; transition: transform 120ms; }
  .sync-pill:active { transform: scale(0.96); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 6px var(--success); animation: gt-pulse 2s ease-in-out infinite; }
  .sync-text { font-size: 11px; color: var(--text-dim); font-weight: 500; }

  /* Tabs */
  .tabs { position: relative; display: flex; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 8px; }
  .tab { flex: 1; padding: 12px 4px 14px; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; color: var(--text-dim); transition: color 200ms, transform 120ms; cursor: pointer; }
  .tab:active { transform: scale(0.94); }
  .tab.active { color: var(--text); }
  .tab-icon { font-size: 16px; transition: transform 200ms cubic-bezier(.2,.8,.2,1); }
  .tab.active .tab-icon { transform: scale(1.1); }
  .tab-indicator { position: absolute; bottom: -1px; height: 2px; background: var(--accent); transition: left 280ms cubic-bezier(.2,.8,.2,1), width 280ms cubic-bezier(.2,.8,.2,1); box-shadow: 0 0 8px var(--accent); }

  /* Main scrolling area */
  .main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 24px; }
  .screen { padding: 16px 16px 100px; animation: gt-tab-in 320ms cubic-bezier(.2,.8,.2,1); }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat { padding: 14px 16px; }
  .stat-label { font-size: 11px; color: var(--text-dim); font-weight: 500; }
  .stat-value { font-family: var(--num); font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; margin-top: 8px; letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
  .stat-value.accent { color: var(--accent); font-size: 24px; }

  .section-title { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .section-title h2 { font-size: 14px; color: var(--text); font-weight: 600; margin: 0; letter-spacing: -0.2px; }
  .section-title .count { font-size: 12px; color: var(--text-dim); font-weight: 500; }
  .add-btn { font-size: 13px; font-weight: 600; color: var(--accent); padding: 4px 8px; cursor: pointer; transition: transform 120ms; }
  .add-btn:active { transform: scale(0.94); }

  .project-list { display: flex; flex-direction: column; gap: 12px; }
  .project-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform 120ms, border-color 200ms; }
  .project-card:active { transform: scale(0.99); }
  .project-card:hover { border-color: var(--border-strong); }
  .project-hero { padding: 14px 16px 8px; background: linear-gradient(180deg, var(--surface-alt) 0%, var(--surface) 100%); border-bottom: 1px solid var(--border); }
  .project-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 4px; }
  .project-meta { font-size: 11px; color: var(--text-dim); font-weight: 500; line-height: 1.2; }
  .project-name { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; line-height: 1.1; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .project-plate { font-family: var(--num); font-size: 11px; font-weight: 600; color: var(--accent); margin-top: 4px; letter-spacing: 0.5px; }
  .progress-badge { padding: 4px 10px; border-radius: 6px; background: var(--surface-alt); border: 1px solid var(--border); font-family: var(--num); font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; }
  .car-illu { height: 70px; margin: -2px 0; }

  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid var(--border); }
  .stats-row > div { padding: 10px 12px; }
  .stats-row > div + div { border-left: 1px solid var(--border); }
  .stats-row .label { font-size: 10px; color: var(--text-dim); font-weight: 500; }
  .stats-row .val { font-family: var(--num); font-size: 14px; font-weight: 700; color: var(--text); margin-top: 3px; letter-spacing: -0.2px; font-variant-numeric: tabular-nums; }
  .stats-row .val.success { color: var(--success); }
  .stats-row .val.danger { color: var(--danger); }

  .budget-row { padding: 10px 16px 14px; }
  .budget-head { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); font-weight: 500; margin-bottom: 6px; }
  .budget-head .v { color: var(--text); font-family: var(--num); font-variant-numeric: tabular-nums; }
  .budget-bar { height: 4px; background: var(--surface-alt); border-radius: 2px; overflow: hidden; }
  .budget-fill { height: 100%; background: var(--accent); transition: width 800ms cubic-bezier(.2,.8,.2,1); box-shadow: 0 0 8px var(--accent); }
  .budget-fill.over { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

  .add-card { margin-top: 14px; padding: 14px; background: transparent; border: 1.5px dashed var(--border-strong); border-radius: var(--radius); text-align: center; font-size: 13px; font-weight: 600; color: var(--text-dim); cursor: pointer; width: 100%; transition: border-color 200ms, color 200ms, transform 120ms; }
  .add-card:hover { border-color: var(--accent); color: var(--accent); }
  .add-card:active { transform: scale(0.99); }

  /* Big total */
  .total-card { padding: 18px 20px; margin-bottom: 16px; }
  .total-label { font-size: 12px; color: var(--text-dim); font-weight: 500; }
  .total-value { font-family: var(--num); font-size: 40px; font-weight: 700; color: var(--text); line-height: 1; margin-top: 8px; letter-spacing: -1px; font-variant-numeric: tabular-nums; }
  .total-sub { font-size: 12px; color: var(--text-dim); margin-top: 8px; }

  .cat-bars { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
  .cat-row { }
  .cat-head { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); font-weight: 500; margin-bottom: 4px; }
  .cat-head .v { color: var(--text); font-family: var(--num); font-variant-numeric: tabular-nums; }
  .cat-bar { height: 6px; background: var(--surface-alt); border-radius: 3px; overflow: hidden; }
  .cat-fill { height: 100%; border-radius: 3px; animation: gt-bar 800ms cubic-bezier(.2,.8,.2,1) both; }

  /* Expense list */
  .day-group { margin-bottom: 16px; }
  .day-label { font-size: 11px; color: var(--text-dim); font-weight: 500; margin-bottom: 6px; padding-left: 2px; }
  .expense-list { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .expense { padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 120ms; }
  .expense:hover { background: var(--surface-alt); }
  .expense + .expense { border-top: 1px solid var(--border); }
  .expense-bar { width: 4px; align-self: stretch; border-radius: 2px; }
  .expense-body { flex: 1; min-width: 0; }
  .expense-desc { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .expense-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .expense-amount { font-family: var(--num); font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; font-variant-numeric: tabular-nums; }

  /* Time / chrono */
  .project-selector { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 16px; }
  .ps-current { min-width: 0; }
  .ps-label { font-size: 11px; color: var(--text-dim); font-weight: 500; }
  .ps-name { font-size: 15px; font-weight: 600; color: var(--text); margin-top: 2px; }
  .ps-chips { display: flex; gap: 6px; flex-shrink: 0; }
  .ps-chip { width: 32px; height: 32px; border-radius: 8px; background: var(--surface-alt); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--num); font-size: 11px; font-weight: 700; color: var(--text-dim); cursor: pointer; transition: all 200ms; }
  .ps-chip:active { transform: scale(0.9); }
  .ps-chip.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

  .chrono-card { padding: 24px 18px 18px; position: relative; overflow: hidden; }
  .chrono-ring1 { position: absolute; top: -60px; left: 50%; transform: translateX(-50%); width: 320px; height: 320px; border-radius: 50%; border: 1px dashed var(--border); opacity: 0.5; pointer-events: none; }
  .chrono-ring2 { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 260px; height: 260px; border-radius: 50%; border: 1px solid var(--border); opacity: 0.4; pointer-events: none; }
  .chrono-status { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 12px; }
  .chrono-status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); transition: background 200ms, box-shadow 200ms; }
  .chrono-status.running .chrono-status-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: gt-pulse 1s ease-in-out infinite; }
  .chrono-status-text { font-size: 11px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.2px; transition: color 200ms; }
  .chrono-status.running .chrono-status-text { color: var(--accent); }

  .chrono-display { text-align: center; position: relative; z-index: 2; font-family: var(--num); font-weight: 700; color: var(--text); letter-spacing: -2px; font-variant-numeric: tabular-nums; }
  .chrono-display .digit { font-size: 56px; line-height: 1; }
  .chrono-display .sep { font-size: 56px; color: var(--text-dim); margin: 0 4px; }
  .chrono-display .cs { font-size: 22px; color: var(--accent); margin-left: 6px; }
  .chrono-sub { text-align: center; margin-top: 8px; font-size: 12px; color: var(--text-dim); font-weight: 500; }
  .chrono-dial { position: relative; height: 40px; margin-top: 12px; display: flex; align-items: center; justify-content: center; }

  .chrono-controls { display: flex; gap: 8px; margin-top: 14px; }
  .btn { padding: 14px; border-radius: var(--radius); text-align: center; font-size: 13px; font-weight: 700; letter-spacing: 0.2px; cursor: pointer; transition: transform 120ms, background 200ms, opacity 200ms; position: relative; overflow: hidden; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: var(--bg); border: 1px solid var(--accent); flex: 2; }
  .btn-primary.running { background: var(--surface-alt); color: var(--text); border-color: var(--border); }
  .btn-secondary { background: var(--surface-alt); color: var(--text-dim); border: 1px solid var(--border); flex: 1; }
  .btn-ghost { margin-top: 8px; padding: 12px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius); text-align: center; font-size: 12px; font-weight: 600; color: var(--text); cursor: pointer; transition: transform 120ms, border-color 200ms; width: 100%; }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost:active { transform: scale(0.99); }

  .ripple { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); background: currentColor; opacity: 0.18; pointer-events: none; animation: gt-ripple 600ms cubic-bezier(.2,.8,.2,1) forwards; }

  /* Sessions list */
  .session-list { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-top: 8px; }
  .session { padding: 11px 14px; display: flex; align-items: center; gap: 12px; }
  .session + .session { border-top: 1px solid var(--border); }
  .session-date { font-family: var(--num); font-size: 11px; color: var(--text-dim); width: 60px; font-weight: 500; }
  .session-desc { flex: 1; font-size: 13px; color: var(--text); }
  .session-hours { font-family: var(--num); font-size: 13px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }

  /* Bilan */
  .roi-card { padding: 20px; }
  .roi-label { font-size: 12px; color: var(--text-dim); font-weight: 500; }
  .roi-value { font-family: var(--num); font-size: 40px; font-weight: 700; line-height: 1; margin-top: 8px; letter-spacing: -1px; font-variant-numeric: tabular-nums; }
  .roi-value.success { color: var(--success); }
  .roi-value.danger { color: var(--danger); }
  .roi-sub { font-size: 12px; color: var(--text-dim); margin-top: 8px; }
  .roi-sub strong { color: var(--text); font-weight: 700; font-family: var(--num); }
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 16px; }
  .kpi { padding: 10px 12px; background: var(--surface-alt); border-radius: var(--radius-sm); border: 1px solid var(--border); }
  .kpi-label { font-size: 10px; color: var(--text-dim); font-weight: 500; }
  .kpi-val { font-family: var(--num); font-size: 14px; font-weight: 700; color: var(--text); margin-top: 3px; letter-spacing: -0.2px; font-variant-numeric: tabular-nums; }
  .kpi-val.accent { color: var(--accent); }

  .chart-card { padding: 16px; margin-bottom: 14px; }
  .chart-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .chart-title { font-size: 12px; color: var(--text-dim); font-weight: 500; }
  .chart-total { font-family: var(--num); font-size: 14px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  .chart-total.text { color: var(--text); }
  .bars { display: flex; align-items: flex-end; gap: 6px; height: 110px; padding-top: 8px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar-fill-wrap { flex: 1; width: 100%; display: flex; align-items: flex-end; }
  .bar-fill { width: 100%; border-radius: 2px; background: var(--surface-alt); border: 1px solid var(--border); transform-origin: bottom; }
  .bar-fill.highlight { background: var(--accent); border: none; }
  .bar-label { font-size: 10px; color: var(--text-dim); font-weight: 500; }
  .bar-label.highlight { color: var(--text); }

  .breakdown-list { display: flex; flex-direction: column; gap: 8px; }
  .breakdown { padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); display: grid; grid-template-columns: 1fr auto; gap: 8px; }
  .breakdown-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .breakdown-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .breakdown-margin { text-align: right; font-family: var(--num); font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .breakdown-margin.success { color: var(--success); }
  .breakdown-margin.danger { color: var(--danger); }
  .breakdown-margin-sub { font-size: 10px; color: var(--text-dim); margin-top: 2px; font-weight: 500; }

  /* Maintenance */
  .pill-row { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
  .pill-row::-webkit-scrollbar { display: none; }
  .pill { padding: 8px 14px; border-radius: 999px; background: var(--surface-alt); border: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text-dim); white-space: nowrap; cursor: pointer; transition: all 200ms; }
  .pill.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .pill:active { transform: scale(0.96); }

  .specs-card { padding: 14px 16px; margin-bottom: 14px; }
  .specs-label { font-size: 12px; color: var(--text-dim); font-weight: 500; }
  .specs-grid { display: grid; grid-template-columns: 1fr 1fr; margin-top: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .specs-cell { padding: 10px 12px; }
  .specs-cell:nth-child(odd) { border-right: 1px solid var(--border); }
  .specs-cell:not(:nth-last-child(-n+2)) { border-bottom: 1px solid var(--border); }
  .specs-cell-label { font-size: 10px; color: var(--text-dim); font-weight: 500; }
  .specs-cell-val { font-family: var(--num); font-size: 14px; font-weight: 700; color: var(--text); margin-top: 3px; letter-spacing: -0.2px; }

  .ai-btn { padding: 16px; border-radius: var(--radius); background: var(--accent); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: transform 120ms, opacity 200ms; }
  .ai-btn:active { transform: scale(0.99); }
  .ai-btn.loading { background: var(--surface); border-color: var(--border); }
  .ai-btn-inner { display: flex; align-items: center; gap: 12px; }
  .ai-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--bg); }
  .ai-btn.loading .ai-icon { background: var(--surface-alt); }
  .ai-spin { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); border-top-color: var(--accent); animation: gt-spin 800ms linear infinite; }
  .ai-title { font-size: 13px; font-weight: 700; color: var(--bg); }
  .ai-btn.loading .ai-title { color: var(--text); }
  .ai-sub { font-size: 11px; color: rgba(0,0,0,0.6); margin-top: 3px; font-weight: 500; }
  .ai-btn.loading .ai-sub { color: var(--text-dim); }
  .ai-arrow { font-size: 18px; color: var(--bg); }

  .ai-result { padding: 16px; margin-top: 14px; animation: gt-rise-in 500ms cubic-bezier(.2,.8,.2,1); }
  .ai-result-title { font-size: 12px; color: var(--accent); font-weight: 700; }
  .ai-items { margin-top: 10px; display: flex; flex-direction: column; }
  .ai-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
  .ai-item + .ai-item { border-top: 1px solid var(--border); }
  .ai-item-label { font-size: 13px; color: var(--text); }
  .ai-item-label.urgent { color: var(--danger); font-weight: 600; }

  .scan-hint { padding: 14px; border-radius: var(--radius); background: var(--surface-alt); border: 1.5px dashed var(--border-strong); text-align: center; margin-bottom: 12px; font-size: 12px; color: var(--text-dim); font-weight: 500; }

  .toast { background: var(--surface); color: var(--text); padding: 10px 16px; border-radius: 999px; font-size: 13px; border: 1px solid rgba(132,204,22,0.4); box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: gt-toast 2200ms cubic-bezier(.2,.8,.2,1) forwards; display: flex; align-items: center; gap: 10px; font-weight: 500; }
  .toast-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px var(--success); }
  .toast.warn .toast-dot { background: var(--warn); box-shadow: 0 0 8px var(--warn); }

  /* Cat colors */

  /* Empty state */

<script>
// DOM helpers — defined first so inline onclick handlers work
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

// ════════════════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════════════════
const SUPABASE_URL_KEY = 'gt_sb_url';
const SUPABASE_KEY_KEY = 'gt_sb_key';
const API_KEY_STORE = 'garagetrack_apikey';
const LOCAL_CACHE = 'garagetrack_cache_v1';
const BACKUP_DATE_KEY = 'garagetrack_last_backup';
const WORKER_URL = 'https://restless-star-0f7c.paulvillemain12.workers.dev';

function getSupabaseUrl() { return localStorage.getItem(SUPABASE_URL_KEY) || ''; }
function getSupabaseKey() { return localStorage.getItem(SUPABASE_KEY_KEY) || ''; }
function getApiKey() { return localStorage.getItem(API_KEY_STORE) || ''; }
function saveApiKey(k) { localStorage.setItem(API_KEY_STORE, k); }

let supabaseReady = false;

// ════════════════════════════════════════════════════════════════════════
// SUPABASE
// ════════════════════════════════════════════════════════════════════════
async function sbFetch(path, options = {}) {
  const url = getSupabaseUrl();
  const key = getSupabaseKey();
  if (!url || !key) return null;
  const res = await fetch(url + '/rest/v1/' + path, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'apikey': key,
      'Authorization': 'Bearer ' + key,
      'Prefer': options.prefer || 'return=representation',
      ...(options.headers || {})
    }
  });
  if (!res.ok) { console.error('Supabase error:', res.status); return null; }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function loadFromSupabase() {
  try {
    const [projets, depenses, sessions] = await Promise.all([
      sbFetch('projets?order=created_at.asc'),
      sbFetch('depenses?order=created_at.asc'),
      sbFetch('sessions?order=created_at.asc')
    ]);
    if (projets === null) return false;
    // Map Supabase columns to app format
    PROJECTS.length = 0;
    (projets || []).forEach(p => {
      const deps = (depenses || []).filter(d => d.projet_id === p.id).map(d => ({
        id: d.id, desc: d.description || '', cat: d.cat || 'Autre',
        amount: d.montant || 0, date: d.date_achat || '', vendor: d.fourn || '',
        photo: d.photo || null
      }));
      const sess = (sessions || []).filter(s => s.projet_id === p.id).map(s => ({
        id: s.id, desc: s.description || '', hours: s.duree || 0,
        date: s.date_session || '', tasks: JSON.parse(s.tasks || '[]')
      }));
      PROJECTS.push({
        id: p.id, name: p.nom || '', plate: p.immat || '', year: p.annee || '',
        purchase: p.achat || 0, budget: p.budget || 0, target: p.revente || 0,
        km: 0, color: '#84cc16', progress: 0, photo: p.photo || null,
        notes: p.notes || '', expenses: deps, sessions: sess
      });
    });
    saveLocal();
    return true;
  } catch(e) { console.error('Load error:', e); return false; }
}

function saveLocal() {
  try { localStorage.setItem(LOCAL_CACHE, JSON.stringify(PROJECTS)); } catch(e) {}
}

function loadLocal() {
  try {
    const d = JSON.parse(localStorage.getItem(LOCAL_CACHE) || '[]');
    if (d.length) { PROJECTS.length = 0; d.forEach(p => PROJECTS.push(p)); return true; }
    return false;
  } catch { return false; }
}

async function sbSaveProject(p) {
  if (!supabaseReady) return;
  await sbFetch('projets', { method: 'POST', prefer: 'return=minimal', body: JSON.stringify({
    id: p.id, nom: p.name, immat: p.plate, annee: p.year ? String(p.year) : '',
    achat: p.purchase, budget: p.budget, revente: p.target,
    notes: p.notes || '', photo: p.photo || null, created_at: new Date().toISOString()
  })});
}

async function sbDeleteProject(id) {
  if (!supabaseReady) return;
  await sbFetch('projets?id=eq.' + id, { method: 'DELETE', prefer: 'return=minimal' });
  await sbFetch('depenses?projet_id=eq.' + id, { method: 'DELETE', prefer: 'return=minimal' });
  await sbFetch('sessions?projet_id=eq.' + id, { method: 'DELETE', prefer: 'return=minimal' });
}

async function sbSaveExpense(e, projetId) {
  if (!supabaseReady) return;
  await sbFetch('depenses', { method: 'POST', prefer: 'return=minimal', body: JSON.stringify({
    id: e.id, projet_id: projetId, description: e.desc, fourn: e.vendor || '',
    montant: e.amount, cat: e.cat, date_achat: e.date, photo: e.photo || null
  })});
}

async function sbSaveSession(s, projetId) {
  if (!supabaseReady) return;
  await sbFetch('sessions', { method: 'POST', prefer: 'return=minimal', body: JSON.stringify({
    id: s.id, projet_id: projetId, description: s.desc, duree: s.hours,
    date_session: s.date, tasks: JSON.stringify(s.tasks || [])
  })});
}

async function sbDeleteExpense(id) {
  if (!supabaseReady) return;
  await sbFetch('depenses?id=eq.' + id, { method: 'DELETE', prefer: 'return=minimal' });
}

async function sbDeleteSession(id) {
  if (!supabaseReady) return;
  await sbFetch('sessions?id=eq.' + id, { method: 'DELETE', prefer: 'return=minimal' });
}

// ════════════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════════════
const fmtEur = (v) => Math.round(v).toLocaleString('fr-FR') + ' €';
const fmtNum = (v, d = 0) => Number(v).toLocaleString('fr-FR', { minimumFractionDigits: d, maximumFractionDigits: d });
const fmtKm = (v) => Math.round(v).toLocaleString('fr-FR') + ' km';
const fmtDate = (d) => new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
const fmtDateShort = (d) => new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
const fmtTime = (ms) => {
  const s = Math.floor(ms / 1000);
  const hh = String(Math.floor(s / 3600)).padStart(2, '0');
  const mm = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
  const ss = String(s % 60).padStart(2, '0');
  const cs = String(Math.floor((ms % 1000) / 10)).padStart(2, '0');
  return { hh, mm, ss, cs };
};

const projectTotal = (p) => p.expenses.reduce((s, e) => s + e.amount, 0);
const projectHours = (p) => p.sessions.reduce((s, e) => s + e.hours, 0);
const projectMargin = (p) => p.target - p.purchase - projectTotal(p);
const projectById = (id) => id ? PROJECTS.find(p => p.id === id) : PROJECTS[0];

// Toast
function toast(msg, kind = 'success') {
  const el = document.createElement('div');
  el.className = 'toast' + (kind !== 'success' ? ' ' + kind : '');
  el.innerHTML = `<div class="toast-dot"></div><span>${msg}</span>`;
  $('#toasts').appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

// Ripple effect
function attachRipple(el) {
  el.addEventListener('pointerdown', (e) => {
    const rect = el.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const r = document.createElement('span');
    r.className = 'ripple';
    r.style.left = x + 'px';
    r.style.top = y + 'px';
    r.style.width = '10px';
    r.style.height = '10px';
    el.appendChild(r);
    setTimeout(() => r.remove(), 600);
  });
}

// Animated number counter
function animateNumber(el, from, to, duration = 700, format = (v) => Math.round(v).toString()) {
  const start = performance.now();
  function tick(t) {
    const k = Math.min(1, (t - start) / duration);
    const eased = 1 - Math.pow(1 - k, 3);
    el.textContent = format(from + (to - from) * eased);
    if (k < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// Animate any element with [data-count-to]
function animateCounters(root) {
  $$('[data-count-to]', root).forEach(el => {
    const to = parseFloat(el.dataset.countTo);
    const fmt = el.dataset.countFmt || 'num';
    let formatter;
    if (fmt === 'eur') formatter = fmtEur;
    else if (fmt === 'eur-sign') formatter = (v) => (v >= 0 ? '+' : '') + fmtEur(v);
    else if (fmt === 'h1') formatter = (v) => fmtNum(v, 1) + ' h';
    else if (fmt === 'pct') formatter = (v) => Math.round(v) + ' %';
    else if (fmt === 'pct1') formatter = (v) => fmtNum(v, 1) + ' %';
    else formatter = (v) => Math.round(v).toString();
    animateNumber(el, 0, to, 800, formatter);
  });
}

// Car silhouette SVG

    <path d="M 60 34 L 92 30 L 128 32 L 152 38 L 148 44 L 64 44 Z" fill="rgba(0,0,0,0.55)"/>

function renderProjects() {

function renderExpenses() {
  // Filtre : si un projet est sélectionné, afficher ses dépenses ; sinon tout
  const filterId = state.expenseFilterId || null;

        <div class="cat-bars">

        <div class="day-group">
          <div class="day-label">${fmtDate(date).toUpperCase()}</div>
          <div class="expense-list">
            ${items.map((e, i) => `
              <div class="expense" style="animation:gt-fade-in 400ms ease ${gi*60+i*30}ms both">

}

              const x2 = Math.cos(a) * 56, y2 = Math.sin(a) * 14;
              return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,0.07)" stroke-width="0.7"/>`;
            }).join('')}
            <circle id="chronoNeedle" r="3" cx="${dotX}" cy="${dotY}" fill="#84cc16" style="filter: drop-shadow(0 0 6px #84cc16)"/>
          </svg>
        </div>
        <div class="chrono-controls">
          <button class="btn btn-primary ${state.running ? 'running' : ''}" data-action="toggle-chrono">${state.running ? '◼ Pause' : '▶ Démarrer'}</button>
          <button class="btn btn-secondary" data-action="reset-chrono">↺ Reset</button>
        </div>
        <button class="btn-ghost" data-action="save-session">+ Enregistrer la session</button>
      </div>

      <div class="section-title" style="margin-top:18px">

        <div style="display:flex;align-items:center;gap:10px">
          <span class="count" style="font-family:var(--num);font-weight:700;color:var(--text)">${fmtNum(totalHours, 1)} h</span>
          <button class="add-btn" data-action="new-session">+ Session</button>

// Live update only the chrono display (no full re-render — keeps animations smooth)
function updateChronoDisplay() {
  if (state.tab !== 'time') return;
  const t = fmtTime(state.ms);
  const h = $('#chronoH'), m = $('#chronoM'), s = $('#chronoS'), cs = $('#chronoCs');
  if (h) h.textContent = t.hh;
  if (m) m.textContent = t.mm;
  if (s) s.textContent = t.ss;
  if (cs) cs.textContent = '.' + t.cs;
  const needle = $('#chronoNeedle');
  if (needle) {
    const seconds = state.ms / 1000;
    const angle = (seconds % 60) * 6;
    needle.setAttribute('cx', Math.cos((angle - 90) * Math.PI / 180) * 50);
    needle.setAttribute('cy', Math.sin((angle - 90) * Math.PI / 180) * 12);
  }
}

function startChronoLoop() {
  if (state.rafId) return;
  state.lastT = performance.now();
  function tick(t) {
    if (!state.running) { state.rafId = null; return; }
    state.ms += t - state.lastT;
    state.lastT = t;
    updateChronoDisplay();
    state.rafId = requestAnimationFrame(tick);
  }
  state.rafId = requestAnimationFrame(tick);
}

function renderBilan() {
  const filterId = state.bilanFilterId || null;
  const sourceProjects = filterId ? PROJECTS.filter(p => p.id === filterId) : PROJECTS;
  const totalSpent = sourceProjects.reduce((s, p) => s + projectTotal(p), 0);
  const totalHours = sourceProjects.reduce((s, p) => s + projectHours(p), 0);
  const totalPurchase = sourceProjects.reduce((s, p) => s + p.purchase, 0);
  const totalTarget = sourceProjects.reduce((s, p) => s + p.target, 0);
  const projectedMargin = totalTarget - totalPurchase - totalSpent;
  const roi = totalSpent ? (projectedMargin / (totalPurchase + totalSpent)) * 100 : 0;

  // Graphique mensuel basé sur les vraies dépenses
  const monthMap = {};
  sourceProjects.flatMap(p => p.expenses).forEach(e => {
    if (!e.date) return;
    const m = e.date.slice(0,7);
    monthMap[m] = (monthMap[m] || 0) + e.amount;
  });
  const monthly = Object.entries(monthMap).sort().slice(-6).map(([k,v]) => ({
    m: ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'][parseInt(k.slice(5))-1],
    v, hl: false
  }));
  if (monthly.length > 0) monthly[monthly.length-1].hl = true;
  const fallback = monthly.length === 0;
  const chartData = fallback ? [{m:'—',v:1,hl:true}] : monthly;
  const monthMax = Math.max(...chartData.map(m => m.v), 1);

  const pillsHtml = `<div class="pill-row" style="margin-bottom:14px">
    <button class="pill ${!filterId ? 'active' : ''}" data-action="filter-bilan" data-id="">Global</button>
    ${PROJECTS.map(p => `<button class="pill ${filterId===p.id?'active':''}" data-action="filter-bilan" data-id="${p.id}">${p.name}</button>`).join('')}
  </div>`;

  const h = `
    <div class="screen">
      ${pillsHtml}
      <div class="card roi-card">
        <div class="roi-label">Marge prévue · ${filterId ? sourceProjects[0]?.name : 'global'}</div>
        <div class="roi-value ${projectedMargin>0?'success':'danger'}" data-count-to="${projectedMargin}" data-count-fmt="eur-sign">0</div>
        <div class="roi-sub">ROI estimé : <strong data-count-to="${roi}" data-count-fmt="pct1">0</strong></div>
        <div class="kpi-grid">
          <div class="kpi"><div class="kpi-label">Achat</div><div class="kpi-val" data-count-to="${totalPurchase}" data-count-fmt="eur">0</div></div>
          <div class="kpi"><div class="kpi-label">Dépenses</div><div class="kpi-val accent" data-count-to="${totalSpent}" data-count-fmt="eur">0</div></div>
          <div class="kpi"><div class="kpi-label">Revente</div><div class="kpi-val" data-count-to="${totalTarget}" data-count-fmt="eur">0</div></div>
        </div>
      </div>

      <div class="card chart-card">
        <div class="chart-head">
          <span class="chart-title">Dépenses · 6 mois</span>
          <span class="chart-total">${fmtEur(monthly.reduce((s,m) => s + m.v, 0))}</span>
        </div>
        <div class="bars">
          ${chartData.map((d, i) => `
            <div class="bar-col">
              <div class="bar-fill-wrap">
                <div class="bar-fill ${d.hl ? 'highlight' : ''}" style="height:${(d.v/monthMax)*100}%; animation: gt-rise 700ms cubic-bezier(.2,.8,.2,1) ${i*50}ms both"></div>
              </div>
              <div class="bar-label ${d.hl ? 'highlight' : ''}">${d.m}</div>
            </div>`).join('')}
        </div>
      </div>

      <div class="card chart-card">
        <div class="chart-head">
          <span class="chart-title">Temps cumulé</span>
          <span class="chart-total text" data-count-to="${totalHours}" data-count-fmt="h1">0</span>
        </div>
        <svg viewBox="0 0 100 50" preserveAspectRatio="none" style="width:100%;height:50px;display:block">
          <defs><linearGradient id="sparkArea" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#84cc16" stop-opacity="0.3"/><stop offset="100%" stop-color="#84cc16" stop-opacity="0"/></linearGradient></defs>
          ${(() => {
            const data = [2,5,8,14,18,24,30,38,44,52,58,67];
            const max = Math.max(...data);
            const pts = data.map((v, i) => `${(i/(data.length-1))*100},${50-(v/max)*46-2}`).join(' ');
            return `<polyline points="0,50 ${pts} 100,50" fill="url(#sparkArea)"/>
                    <polyline points="${pts}" fill="none" stroke="#84cc16" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`;
          })()}
        </svg>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);margin-top:6px;font-weight:500">
          <span>12 semaines</span>
          <span>+9 h cette semaine</span>
        </div>
      </div>

      <h2 style="font-size:14px;color:var(--text);font-weight:600;margin:0 0 10px;letter-spacing:-0.2px">Détail par projet</h2>
      <div class="breakdown-list">
        ${PROJECTS.map((p, i) => {
          const spent = projectTotal(p);
          const margin = projectMargin(p);
          return `
            <div class="breakdown" style="animation: gt-fade-in 400ms ease ${i*80}ms both">
              <div>

        }).join('')}

  setTimeout(() => animateCounters($('#main')), 30);

let scanPhotoData = null;
function handleScanPhoto(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    scanPhotoData = e.target.result;
    const preview = document.getElementById('scanPreview');
    const label = document.getElementById('scanLabel');
    const analyzeDiv = document.getElementById('scanAnalyzeBtn');
    if (preview) { preview.src = e.target.result; preview.style.display = 'block'; }
    if (label) label.textContent = '📷 Photo ajoutée';
    if (analyzeDiv) analyzeDiv.style.display = 'block';
  };
  reader.readAsDataURL(input.files[0]);
}

async function analyseFacture() {
  const apiKey = getApiKey();
  if (!apiKey) { openSheet('Clé API', sheetApiKey()); return; }
  if (!scanPhotoData) { toast('Prends une photo d\'abord', 'warn'); return; }
  const btn = document.getElementById('scanBtn');
  if (btn) { btn.classList.add('loading'); btn.querySelector('.ai-title').textContent = 'Analyse en cours…'; }
  try {
    const base64 = scanPhotoData.split(',')[1];
    const mediaType = 'image/jpeg';
    const res = await fetch(WORKER_URL, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 800,
        system: 'Tu extrais des données de factures. Réponds UNIQUEMENT en JSON valide sans markdown.',
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: 'Extrais les produits de cette facture. JSON: {"fournisseur":"nom ou null","produits":[{"description":"nom piece","montant":12.50,"categorie":"Pièces mécaniques|Carrosserie|Électrique|Fluides / consommables|Outillage|Autre"}]}. Si illisible: {"erreur":"non lisible"}' }
        ]}] })
    });
    const data = await res.json();
    const raw = data.content[0].text.trim();
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Réponse invalide');
    const result = JSON.parse(match[0]);
    if (result.erreur) { toast(result.erreur, 'warn'); return; }
    const produits = result.produits || [];
    if (!produits.length) { toast('Aucun produit détecté', 'warn'); return; }
    const p = produits[0];
    const descInput = document.querySelector('#formNewExpense [name="desc"]');
    const amountInput = document.querySelector('#formNewExpense [name="amount"]');
    const vendorInput = document.querySelector('#formNewExpense [name="vendor"]');
    const catSelect = document.querySelector('#formNewExpense [name="cat"]');
    if (descInput) descInput.value = p.description || '';
    if (amountInput) amountInput.value = p.montant || '';
    if (vendorInput && result.fournisseur) vendorInput.value = result.fournisseur;
    if (catSelect && p.categorie) catSelect.value = p.categorie;
    toast(produits.length > 1 ? produits.length + ' produits détectés — 1er rempli' : 'Facture analysée ✓');
  } catch(err) { toast('Erreur: ' + err.message.slice(0,30), 'warn'); }
  finally {
    if (btn) { btn.classList.remove('loading'); btn.querySelector('.ai-title').textContent = 'Analyser la facture'; }
  }
}

    }

    state.aiResult = null;
    renderEntretien();

    const codeMoteur = state.entretienCode || '';

      toast('Renseigne la motorisation d\'abord', 'warn');
      renderEntretien();
      return;

      try {
        const prompt = 'Tu es un expert mécanique auto. Véhicule: ' + p.name + (p.year ? ' (' + p.year + ')' : '') + ', motorisation: ' + moteur + (codeMoteur ? ', code moteur EXACT: ' + codeMoteur : '') + '. Km actuel: ' + (km || 'inconnu') + '. Dernière vidange: ' + (lastVidange || 'inconnue') + '. Indique PRECISEMENT courroie ou chaine pour CE moteur. Réponds UNIQUEMENT en JSON: {"huile":{"spec":"","quantite":"","marque":""},"filtres":{"huile":"","air":"","habitacle":"","carburant":""},"interventions":[{"nom":"","intervalle_km":0,"statut":"urgent|bientot|ok","detail":""}],"conseils":""}';
        const res = await fetch(WORKER_URL, {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 1000,
            system: 'Réponds UNIQUEMENT en JSON valide, sans markdown ni texte.',
            messages: [{ role: 'user', content: prompt }] })
        });
        const data = await res.json();
        const raw = data.content[0].text.trim();
        const match = raw.match(/\{[\s\S]*\}/);
        if (!match) throw new Error('Réponse invalide');
        const result = JSON.parse(match[0]);

        state.aiLoading = false;
        state.aiResult = result;
        renderEntretien();
        toast('Analyse terminée');
      } catch(err) {
        state.aiLoading = false;
        state.aiResult = null;
        renderEntretien();
        toast('Erreur: ' + err.message.slice(0,30), 'warn');
      }
    })();
  }
  else if (action === 'save-entretien-form') {
    const p = projectById(state.activeProjectId);

    document.querySelector('[data-action="ai-analyze"]')?.click();
  }
  else if (action === 'open-api-key') {
    openSheet('Clé API', sheetApiKey());
  }
  else if (action === 'open-supabase') {
    openSheet('Connexion Supabase', sheetSupabase());
  }
  else if (action === 'open-backup') {
    openSheet('Sauvegarde', sheetBackup());
  }
  else if (action === 'delete-expense') {
    const pid = t.dataset.pid;
    const eid = t.dataset.eid;
    const p = projectById(pid);
    if (p) { p.expenses = p.expenses.filter(e => e.id !== eid); saveLocal(); sbDeleteExpense(eid); }
    toast('Dépense supprimée');
    render();
  }
  else if (action === 'save-session') {
    if (state.ms < 1000) { toast('Démarrer le chrono d\'abord', 'warn'); return; }
    const p = projectById(state.activeProjectId);
    if (p) {
      const desc = prompt('Description de la session ?') || 'Session chrono';
      const newS = { id: Date.now().toString(36)+Math.random().toString(36).slice(2,6), desc, hours: parseFloat((state.ms/3600000).toFixed(2)), date: new Date().toISOString().slice(0,10), tasks: [] };
      p.sessions.unshift(newS);
      saveLocal();
      sbSaveSession(newS, p.id);
    }
    state.ms = 0; state.running = false;
    toast('Session enregistrée');
    renderTime();
  }
});

function importFromBackup() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const data = parsed.db?.projets ? parsed.db : { projets: parsed };
        const projets = Array.isArray(parsed) ? parsed : (parsed.db?.projets || parsed.projets || []);
        const depenses = parsed.db?.depenses || parsed.depenses || [];
        const sessions = parsed.db?.sessions || parsed.sessions || [];
        if (!projets.length) { toast('Fichier invalide', 'warn'); return; }
        if (!confirm('Importer ' + projets.length + ' projet(s) ?')) return;
        toast('Import en cours…');
        PROJECTS.length = 0;
        for (const p of projets) {
          const deps = depenses.filter(d => d.projetId === p.id).map(d => ({ id: d.id, desc: d.desc || '', cat: d.cat || 'Autre', amount: d.montant || 0, date: d.date || '', vendor: d.fourn || '', photo: d.photo || null }));
          const sess = sessions.filter(s => s.projetId === p.id).map(s => ({ id: s.id, desc: s.desc || '', hours: s.duree || 0, date: s.date || '', tasks: s.tasks || [] }));
          const newP = { id: p.id, name: p.nom || p.name || 'Projet', plate: p.immat || p.plate || '', year: p.annee || p.year || '', purchase: p.achat || p.purchase || 0, budget: p.budget || 0, target: p.revente || p.target || 0, km: 0, color: '#84cc16', progress: 0, notes: p.notes || '', photo: p.photo || null, expenses: deps, sessions: sess };
          PROJECTS.push(newP);
          if (supabaseReady) {
            await sbSaveProject(newP);
            for (const d of deps) await sbSaveExpense(d, newP.id);
            for (const s of sess) await sbSaveSession(s, newP.id);
          }
        }
        saveLocal();
        if (PROJECTS.length > 0) state.activeProjectId = PROJECTS[0].id;
        closeSheet();
        render();
        toast(projets.length + ' projets importés ✓');
      } catch(err) { toast('Erreur: ' + err.message.slice(0,30), 'warn'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function exportBackup() {
  const data = { version: 1, exportedAt: new Date().toISOString(), db: {
    projets: PROJECTS.map(p => ({ id: p.id, nom: p.name, immat: p.plate, annee: p.year, achat: p.purchase, budget: p.budget, revente: p.target, notes: p.notes, photo: p.photo, createdAt: Date.now() })),
    depenses: PROJECTS.flatMap(p => p.expenses.map(e => ({ id: e.id, projetId: p.id, desc: e.desc, fourn: e.vendor, montant: e.amount, cat: e.cat, date: e.date, photo: e.photo }))),
    sessions: PROJECTS.flatMap(p => p.sessions.map(s => ({ id: s.id, projetId: p.id, desc: s.desc, duree: s.hours, date: s.date, tasks: s.tasks })))
  }};
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'garagetrack-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
  localStorage.setItem(BACKUP_DATE_KEY, Date.now().toString());
  closeSheet(); toast('Sauvegarde téléchargée ✓');
}

document.addEventListener('pointerdown', (e) => {
  const btn = e.target.closest('.btn, .pill, .ai-btn, .form-submit, .add-card, .add-btn, .sync-pill, .ps-chip');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const r = document.createElement('span');
  r.className = 'ripple';
  r.style.left = x + 'px';
  r.style.top = y + 'px';
  if (getComputedStyle(btn).position === 'static') btn.style.position = 'relative';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 600);
});

// Initial render
async function init() {
  loadLocal();
  if (PROJECTS.length > 0) state.activeProjectId = PROJECTS[0].id;
  render();
  requestAnimationFrame(moveIndicator);
  if (getSupabaseUrl() && getSupabaseKey()) {
    const ok = await loadFromSupabase();
    if (ok) {
      supabaseReady = true;
      if (PROJECTS.length > 0) state.activeProjectId = PROJECTS[0].id;
      updateSyncPill();
      render();
    }
  }
  updateSyncPill();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
}
init();
</script>
